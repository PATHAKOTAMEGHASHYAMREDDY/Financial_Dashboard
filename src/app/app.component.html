<nz-layout class="app-layout">
  <!-- Mobile Overlay -->
  <div class="mobile-overlay" 
       [class.active]="isMobileSidebarOpen" 
       (click)="closeMobileSidebar()"></div>

  <nz-sider
    class="menu-sidebar"
    [class.mobile-open]="isMobileSidebarOpen"
    nzCollapsible
    nzWidth="250px"
    [nzCollapsedWidth]="80"
    nzBreakpoint="lg"
    [(nzCollapsed)]="isCollapsed"
    [nzTrigger]="null"
    (mouseenter)="onSidebarMouseEnter()"
    (mouseleave)="onSidebarMouseLeave()">

    <!-- Logo -->
    <div class="logo-container">
      <div class="logo">
        <i nz-icon nzType="rise" nzTheme="outline" class="logo-icon"></i>
        <span *ngIf="!isCollapsed" class="logo-text">
          <span class="fin">Fin</span><span class="dash">Dash</span>
        </span>
      </div>
    </div>

    <!-- Navigation -->
    <ul nz-menu nzTheme="dark" nzMode="inline"
        [nzInlineCollapsed]="isCollapsed"
        class="sidebar-menu">

      <li nz-menu-item nzMatchRouter (click)="onMenuItemClick()">
        <a routerLink="/dashboard" class="menu-link">
          <i nz-icon nzType="dashboard" class="menu-icon"></i>
          <span>Dashboard</span>
        </a>
      </li>

      <li nz-menu-item nzMatchRouter (click)="onMenuItemClick()">
        <a routerLink="/transactions" class="menu-link">
          <i nz-icon nzType="swap" class="menu-icon"></i>
          <span>Transactions</span>
        </a>
      </li>

      <li nz-menu-divider></li>

      <li nz-menu-item
          class="role-menu-item"
          (click)="onRoleChange(currentRole === 'admin' ? 'viewer' : 'admin'); onMenuItemClick()"
          nz-tooltip
          [nzTooltipTitle]="isCollapsed ? (currentRole === 'admin' ? 'Switch to Viewer' : 'Switch to Admin') : ''"
          nzTooltipPlacement="right">
        <i nz-icon [nzType]="currentRole === 'admin' ? 'crown' : 'eye'" class="menu-icon"></i>
        <span>{{ currentRole === 'admin' ? 'Admin Mode' : 'Viewer Mode' }}</span>
      </li>
    </ul>
  </nz-sider>

  <nz-layout [style.margin-left.px]="sidebarWidth">
    <!-- Header -->
    <nz-header class="header">
      <div class="header-inner">

        <!-- Mobile Hamburger Menu Button -->
        <button class="hamburger-btn" (click)="toggleMobileSidebar()" aria-label="Toggle menu">
          <span class="hamburger-line" [class.open]="isMobileSidebarOpen"></span>
          <span class="hamburger-line" [class.open]="isMobileSidebarOpen"></span>
          <span class="hamburger-line" [class.open]="isMobileSidebarOpen"></span>
        </button>

        <!-- Left: Title + Live dot -->
        <div class="header-left">
          <h2 class="header-title">Finance Dashboard</h2>
          <div class="live-indicator">
            <span class="live-dot"></span>
            <span class="live-text">LIVE</span>
          </div>
        </div>

        <!-- Right: Role pill + Divider + Theme toggle -->
        <div class="header-right">

          <!-- Role Pill -->
          <div class="role-pill" [class.is-admin]="currentRole === 'admin'"
               (click)="onRoleChange(currentRole === 'admin' ? 'viewer' : 'admin')"
               nz-tooltip
               [nzTooltipTitle]="currentRole === 'admin' ? 'Switch to Viewer' : 'Switch to Admin'">
            <span class="role-dot"></span>
            <span class="role-label">{{ currentRole === 'admin' ? 'Admin' : 'Viewer' }}</span>
          </div>

          <div class="header-divider"></div>

          <!-- Theme Toggle -->
          <button
            class="icon-btn"
            (click)="toggleTheme()"
            nz-tooltip
            [nzTooltipTitle]="isDarkMode ? 'Light Mode' : 'Dark Mode'">
            <i nz-icon [nzType]="isDarkMode ? 'sun' : 'moon'" class="icon-btn-icon"></i>
          </button>
        </div>
      </div>
    </nz-header>

    <!-- Main Content -->
    <nz-content class="inner-content">
      <router-outlet></router-outlet>
    </nz-content>
  </nz-layout>
</nz-layout>
